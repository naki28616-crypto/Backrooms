        .stamina-bg { height:6px; background:rgba(0,0,0,0.8); }

        .red-dot { width: 12px; height: 12px; background-color: #ff3c3c; border-radius: 50%; display: inline-block; margin-right: 8px; animation: blink 1s steps(2) infinite; }

        .glitch { position: relative; font-family: 'Courier New', Courier, monospace; font-weight: 900; text-transform: uppercase; color: #d2be83; margin: 0; line-height: 1.1; text-shadow: 2px 2px 0px #8b753a, 4px 4px 0px #5c4e27, 6px 6px 0px #312914, 8px 8px 15px rgba(0,0,0,1); animation: master-jitter 3s infinite; }

        .glitch::before, .glitch::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; z-index: -1; }
        .glitch::before { left: 3px; text-shadow: -2px 0 #3a3219, 0 0 5px rgba(0,0,0,0.8); clip: rect(24px, 9999px, 90px, 0); animation: glitch-anim-1 2s infinite linear alternate-reverse; }
        .glitch::after { left: -3px; text-shadow: -2px 0 #8b753a, 2px 2px 5px rgba(0,0,0,0.9); clip: rect(85px, 9999px, 140px, 0); animation: glitch-anim-2 3s infinite linear alternate-reverse; }

        @keyframes master-jitter { 0%, 90% { transform: translate(0,0); } 92% { transform: translate(-2px, 1px) skew(1deg); } 94% { transform: translate(2px, -2px) skew(-1deg); } 96% { transform: translate(-1px, 2px); } 98% { transform: translate(1px, -1px); } 100% { transform: translate(0,0); } }
        @keyframes glitch-anim-1 { 0% { clip: rect(10px, 9999px, 30px, 0); } 20% { clip: rect(60px, 9999px, 90px, 0); } 40% { clip: rect(20px, 9999px, 40px, 0); } 60% { clip: rect(80px, 9999px, 100px, 0); } 80% { clip: rect(5px, 9999px, 15px, 0); } 100% { clip: rect(40px, 9999px, 70px, 0); } }
        @keyframes glitch-anim-2 { 0% { clip: rect(80px, 9999px, 100px, 0); } 20% { clip: rect(10px, 9999px, 40px, 0); } 40% { clip: rect(50px, 9999px, 70px, 0); } 60% { clip: rect(20px, 9999px, 50px, 0); } 80% { clip: rect(90px, 9999px, 120px, 0); } 100% { clip: rect(30px, 9999px, 60px, 0); } }

        #btn-open-settings {

<body>

<div id="vhs-overlay"></div>

<div id="interact-prompt"></div>
<div id="game-toast"></div>

<div id="start-screen">

</div>

<script>

let mapData = [];

bgmAudio.volume = volBgm;
function updateBgmVolume(val) {
    volBgm = parseFloat(val);
    bgmAudio.volume = volBgm;
}

function updatePlatformUI(selectedPf) {
    platform = selectedPf;
    document.getElementById('set-plat-pc').classList.toggle('active', platform === 'pc');
    document.getElementById('set-plat-mo').classList.toggle('active', platform === 'mobile');

updatePlatformUI(platform);

let lastHB = 0;

let hasKey = false;
let keyMesh = null, doors = [];
let trueDoorIdx = 0;
let pitCX = 0, pitCZ = 0;
let bingoDoorL = {r:0, c:0}, bingoDoorR = {r:0, c:0};

const B_GRID_DIV = 5;
const B_PATH_W = 2.0; 
const B_HOLE_W = 10.2;

let underground = false;
let ugMap = [], ugWalls = null, ugFloor = null, ugCeil = null, ugObjs = [];
let ugOX = 0, ugOZ = 0; 
let hasLadder = false, ladderItem = null, ladderMesh = null, ladderPlaced = false;

let surfaceHoleSpawn = {x:0, z:0, lookX:0, lookZ:1};

let centerSpawnPoint = {x:0, z:0};
let entitySpawnPoint = {x:0, z:0};

const BG_COL = 0x8a7a40;

function loadSave() {
    const saveStr = localStorage.getItem('backrooms_save');
    if(saveStr) {
        try {
            const save = JSON.parse(saveStr);
            if(save.page === 2) {
                window.location.href = 'index2.html?time=' + save.time + '&level=' + (save.level||0);
                return;
            } else {
                recTime = save.time || 0;
                launchGame(true);
                showToast("SAVE LOADED");
            }
        } catch(e) { alert("Save file corrupted."); }
    } else {
        alert("NO SAVE DATA FOUND.");
    }
}

function createProceduralTexture(type) {
    const c = document.createElement('canvas'); c.width = c.height = 512; const ctx = c.getContext('2d');
    if (type === 'wall') {
        ctx.fillStyle = '#bfa95a'; ctx.fillRect(0,0,512,512);
        for(let i=0; i<4000; i++) {
            ctx.fillStyle = `rgba(100, 80, 20, ${Math.random()*0.15})`;
            ctx.fillRect(Math.random()*512, Math.random()*512, Math.random()*10, Math.random()*50);
        }
        ctx.strokeStyle = 'rgba(150, 130, 60, 0.4)';
        ctx.lineWidth = 4;
        for(let i=0; i<=512; i+=32) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 512); ctx.stroke(); }
    } else if (type === 'floor') {
        ctx.fillStyle = '#5c5234';
        ctx.fillRect(0,0,512,512);
        for(let i=0; i<10000; i++) {
            ctx.fillStyle = (Math.random()>0.5) ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.05)';
            ctx.fillRect(Math.random()*512, Math.random()*512, 2, 2);
        }
    } else if (type === 'ceil') {
        ctx.fillStyle = '#c7c2ab';
        ctx.fillRect(0,0,512,512);
        ctx.strokeStyle = '#8a8571'; ctx.lineWidth = 2;
        ctx.strokeRect(0,0,512,512);
    }
    const tex = new THREE.CanvasTexture(c);
    if(type !== 'wall') { tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(30, 30); }
    return tex;
}

const wallTex = createProceduralTexture('wall'), floorTex = createProceduralTexture('floor'), ceilTex = createProceduralTexture('ceil');
const wallMat = new THREE.MeshStandardMaterial({map:wallTex, roughness:0.8});
const floorMat = new THREE.MeshStandardMaterial({map:floorTex, roughness:0.9});
const ceilMat = new THREE.MeshStandardMaterial({map:ceilTex, roughness:1.0});

function worldXZ(r,c){ return {x: (c-COLS/2)*UNIT + UNIT/2, z: (r-ROWS/2)*UNIT + UNIT/2}; }

function genRandomMap() {
    mapData = Array(ROWS).fill().map(()=>Array(COLS).fill(1));
    function carve(r, c) {
        mapData[r][c] = 0;
        const dirs = [[-2,0], [2,0], [0,-2], [0,2]].sort(()=>Math.random()-0.5);
        for(let [dr, dc] of dirs) {
            let nr = r + dr, nc = c + dc;
            if(nr > 0 && nr < ROWS-1 && nc > 0 && nc < COLS-1 && mapData[nr][nc] === 1) {
                mapData[r + dr/2][c + dc/2] = 0;
                carve(nr, nc);
            }
        }
    }
    
    let startR = ROWS - 4;
    let startC = Math.floor(COLS / 2);
    
    carve(startR, startC);
    for(let i=0; i<800; i++) { 
        let r = Math.floor(Math.random()*(ROWS-4))+2;
        let c = Math.floor(Math.random()*(COLS-4))+2; 
        mapData[r][c] = 0;
    }

    function clearArea(r1, r2, c1, c2) {
        for(let r=r1; r<=r2; r++) {
            for(let c=c1; c<=c2; c++) {
                if(r>0 && r<ROWS-1 && c>0 && c<COLS-1) mapData[r][c] = 0;
            }
        }
    }
    
    for (let i = 0; i < 40; i++) {
        let rr = Math.floor(Math.random() * (ROWS - 12)) + 6;
        let rc = Math.floor(Math.random() * (COLS - 12)) + 6;
        let rw = Math.floor(Math.random() * 4) + 2;
        let rh = Math.floor(Math.random() * 4) + 2; 
        clearArea(rr, rr + rh, rc, rc + rw);
    }

    function fillArea(r1, r2, c1, c2) {
        for(let r=r1; r<=r2; r++) {
            for(let c=c1; c<=c2; c++) {
                if(r>0 && r<ROWS-1 && c>0 && c<COLS-1) mapData[r][c] = 1;
            }
        }
    }

    let br = Math.floor(Math.random() * (ROWS - 35)) + 15;
    let bc = Math.floor(Math.random() * (COLS - 30)) + 15;
    fillArea(br - 8, br + 12, bc - 8, bc + 8);
    clearArea(startR - 1, startR + 1, startC - 1, startC + 1);
    centerSpawnPoint = worldXZ(startR, startC);

    let cr = br + 4;
    while(cr < ROWS - 2) {
        clearArea(cr, cr, bc, bc);
        if (cr > br + 12 && (mapData[cr][bc-1] === 0 || mapData[cr][bc+1] === 0 || mapData[cr+1][bc] === 0)) {
            break;
        }
        cr++;
    }

    clearArea(br - 3, br + 3, bc - 3, bc + 3);
    clearArea(br - 4, br - 4, bc, bc);
    clearArea(br - 5, br - 5, bc - 5, bc + 5);
    clearArea(br - 6, br - 6, bc - 5, bc - 5);
    clearArea(br - 6, br - 6, bc + 5, bc + 5);
    bingoDoorL = {r: br - 6, c: bc - 5};
    bingoDoorR = {r: br - 6, c: bc + 5};
    
    pitCX = (bc - COLS/2)*UNIT + UNIT/2;
    pitCZ = (br - ROWS/2)*UNIT + UNIT/2;
    
    entitySpawnPoint = worldXZ(Math.floor(ROWS/2), Math.floor(COLS/2));
}

    if(iWalls){
        scene.remove(iWalls);
        if(iWalls.children) { iWalls.children.forEach(c => { if(c.geometry) c.geometry.dispose(); }); }

    if(ceilM){scene.remove(ceilM); ceilM=null;}
    if(floorGroup){scene.remove(floorGroup); floorGroup=null;}
    
    let wc=0;
    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            if(mapData[r][c]===0) {
                if(r>0 && mapData[r-1][c]===1) wc++;
                if(r<ROWS-1 && mapData[r+1][c]===1) wc++;
                if(c>0 && mapData[r][c-1]===1) wc++;
                if(c<COLS-1 && mapData[r][c+1]===1) wc++;
            }
        }
    }
    
    const wGeo = new THREE.BoxGeometry(UNIT, WH, 0.02);
    iWalls = new THREE.InstancedMesh(wGeo, wallMat, wc);
    
    const dum = new THREE.Object3D(); let idx=0;
    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            if(mapData[r][c]===0) {
                const wx = (c-COLS/2)*UNIT + UNIT/2, wz = (r-ROWS/2)*UNIT + UNIT/2;
                if(r>0 && mapData[r-1][c]===1) {
                    dum.position.set(wx, WH/2, wz - UNIT/2);
                    dum.rotation.set(0, 0, 0); dum.updateMatrix();
                    iWalls.setMatrixAt(idx++, dum.matrix);
                }
                if(r<ROWS-1 && mapData[r+1][c]===1) {
                    dum.position.set(wx, WH/2, wz + UNIT/2);
                    dum.rotation.set(0, 0, 0); dum.updateMatrix();
                    iWalls.setMatrixAt(idx++, dum.matrix);
                }
                if(c>0 && mapData[r][c-1]===1) {
                    dum.position.set(wx - UNIT/2, WH/2, wz);
                    dum.rotation.set(0, Math.PI/2, 0); dum.updateMatrix();
                    iWalls.setMatrixAt(idx++, dum.matrix);
                }
                if(c<COLS-1 && mapData[r][c+1]===1) {
                    dum.position.set(wx + UNIT/2, WH/2, wz);
                    dum.rotation.set(0, Math.PI/2, 0); dum.updateMatrix();
                    iWalls.setMatrixAt(idx++, dum.matrix);
                }

                if(Math.random() < 0.03){ 
                    const lg = new THREE.Group();
                    const fr = new THREE.Mesh(new THREE.BoxGeometry(4, .05, 1.5), new THREE.MeshStandardMaterial({color:0x222}));
                    const pn = new THREE.Mesh(new THREE.BoxGeometry(3.8, .06, 1.3), new THREE.MeshBasicMaterial({color:0xfffcd1}));
                    pn.position.y = -.01; lg.add(fr, pn);
                    lg.position.set(wx, WH-.03, wz);
                    scene.add(lg); lamps.push(lg);
                    const pl = new THREE.PointLight(0xfff5bf, 1.2, 15, 1.2);
                    pl.position.set(wx, WH-.5, wz); scene.add(pl); lamps.push(pl);
                }
            }
        }
    }
    iWalls.instanceMatrix.needsUpdate = true;
    scene.add(iWalls);

    const mW = COLS*UNIT, mH = ROWS*UNIT;
    floorM = new THREE.Mesh(new THREE.PlaneGeometry(mW, mH), floorMat);
    floorM.rotation.x = -Math.PI/2; scene.add(floorM);
    ceilM = new THREE.Mesh(new THREE.PlaneGeometry(mW, mH), ceilMat);
    ceilM.rotation.x = Math.PI/2; ceilM.position.y = WH; scene.add(ceilM);
}

function safeSpawn(avoid, minD){
    for(let i=0; i<1000; i++){
        const r=Math.floor(Math.random()*(ROWS-10))+5;
        const c=Math.floor(Math.random()*(COLS-10))+5;
        
        if(r >= 8 && r <= 32 && c >= 27 && c <= 37) continue;
        if(mapData[r][c] === 0){
            const p = worldXZ(r,c);
            if(avoid && minD && Math.sqrt((p.x-avoid.x)**2 + (p.z-avoid.z)**2) < minD) continue;
            return {x:p.x, z:p.z, r, c};
        }
    }
    return {x:UNIT, z:UNIT, r:1, c:1};
}

function buildSurfaceHole() {
    if(surfaceHoleGroup) { scene.remove(surfaceHoleGroup); surfaceHoleGroup = null; }
    
    const sp = safeSpawn({x:pitCX, z:pitCZ}, 25);
    let targetWall = null;
    const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
    for (let [dr, dc] of dirs) {
        if (sp.r+dr>0 && sp.r+dr<ROWS-1 && sp.c+dc>0 && sp.c+dc<COLS-1) {
            if (mapData[sp.r+dr][sp.c+dc] === 1) { targetWall = { r: dr, c: dc }; break; }
        }
    }
    
    if(targetWall) {
        let wx = (sp.c + targetWall.c - COLS/2)*UNIT + UNIT/2;
        let wz = (sp.r + targetWall.r - ROWS/2)*UNIT + UNIT/2;
        
        surfaceHoleGroup = new THREE.Group();
        surfaceHoleGroup.position.set(wx - targetWall.c*(UNIT*0.5 + 0.1), 0.5, wz - targetWall.r*(UNIT*0.5 + 0.1));
        surfaceHoleGroup.rotation.y = Math.atan2(targetWall.c, targetWall.r);
        const hIn = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.0, 0.1), new THREE.MeshBasicMaterial({color:0x000})); 
        const hl1 = new THREE.PointLight(0x00ff44, 2, 8); hl1.position.set(0, 0, 0.5);
        surfaceHoleGroup.add(hIn, hl1);
        scene.add(surfaceHoleGroup);
        
        surfaceHoleSpawn = { x: sp.x, z: sp.z, lookX: -targetWall.c, lookZ: -targetWall.r };
    }
}

function buildBingoPit(){
    pitMeshes.forEach(m => { if(m && m.parent) scene.remove(m); }); pitMeshes = [];
    if(pitVoid) { scene.remove(pitVoid); pitVoid = null; }
    
    PIT_TOTAL = B_GRID_DIV * B_HOLE_W + (B_GRID_DIV + 1) * B_PATH_W;
    const hf = PIT_TOTAL / 2;
    pitBounds.minX = pitCX - hf; pitBounds.maxX = pitCX + hf;
    pitBounds.minZ = pitCZ - hf; pitBounds.maxZ = pitCZ + hf;
    pitBounds.active = true;

    if(floorM) floorM.visible = false;
    floorGroup = new THREE.Group();
    const mW = COLS*UNIT, mH = ROWS*UNIT;

    const nL = pitBounds.minZ - (-mH/2);
    if(nL>0){ const fN = new THREE.Mesh(new THREE.PlaneGeometry(mW, nL), floorMat); fN.rotation.x = -Math.PI/2; fN.position.set(0,0,-mH/2+nL/2); floorGroup.add(fN); }
    const sL = mH/2 - pitBounds.maxZ; if(sL>0){ const fS = new THREE.Mesh(new THREE.PlaneGeometry(mW, sL), floorMat);
    fS.rotation.x = -Math.PI/2; fS.position.set(0,0,pitBounds.maxZ+sL/2); floorGroup.add(fS); }
    const wL = pitBounds.minX - (-mW/2);
    const pZLen = pitBounds.maxZ - pitBounds.minZ;
    if(wL>0){ const fW = new THREE.Mesh(new THREE.PlaneGeometry(wL, pZLen), floorMat); fW.rotation.x = -Math.PI/2; fW.position.set(-mW/2+wL/2,0,pitCZ); floorGroup.add(fW); }
    const eL = mW/2 - pitBounds.maxX; if(eL>0){ const fE = new THREE.Mesh(new THREE.PlaneGeometry(eL, pZLen), floorMat);
    fE.rotation.x = -Math.PI/2; fE.position.set(pitBounds.maxX+eL/2,0,pitCZ); floorGroup.add(fE); }
    scene.add(floorGroup);

    const pathMat = floorMat; 
    const downWallMat = new THREE.MeshStandardMaterial({map:wallTex, roughness:0.9});
    const voidMat = new THREE.MeshBasicMaterial({color:0x000});
    const holeDepth = 15;

    const hGeo = new THREE.BoxGeometry(PIT_TOTAL, 0.1, B_PATH_W);
    for(let i=0; i<=B_GRID_DIV; i++) {
        const z = pitBounds.minZ + B_PATH_W/2 + i*(B_HOLE_W+B_PATH_W);
        const p = new THREE.Mesh(hGeo, pathMat); p.position.set(pitCX, 0.0, z); scene.add(p); pitMeshes.push(p);
    }
    const vGeo = new THREE.BoxGeometry(B_PATH_W, 0.1, PIT_TOTAL);
    for(let i=0; i<=B_GRID_DIV; i++) {
        const x = pitBounds.minX + B_PATH_W/2 + i*(B_HOLE_W+B_PATH_W);
        const p = new THREE.Mesh(vGeo, pathMat); p.position.set(x, 0.0, pitCZ); scene.add(p); pitMeshes.push(p);
    }

    const wGeoX = new THREE.BoxGeometry(B_HOLE_W, holeDepth, 0.1); const wGeoZ = new THREE.BoxGeometry(0.1, holeDepth, B_HOLE_W);
    for(let r=0; r<B_GRID_DIV; r++) {
        for(let c=0; c<B_GRID_DIV; c++) {
            const hx = pitBounds.minX + B_PATH_W + B_HOLE_W/2 + c*(B_HOLE_W+B_PATH_W);
            const hz = pitBounds.minZ + B_PATH_W + B_HOLE_W/2 + r*(B_HOLE_W+B_PATH_W);
            const wN = new THREE.Mesh(wGeoX, downWallMat); wN.position.set(hx, -holeDepth/2, hz-B_HOLE_W/2);
            const wS = new THREE.Mesh(wGeoX, downWallMat); wS.position.set(hx, -holeDepth/2, hz+B_HOLE_W/2);
            const wW = new THREE.Mesh(wGeoZ, downWallMat); wW.position.set(hx-B_HOLE_W/2, -holeDepth/2, hz);
            const wE = new THREE.Mesh(wGeoZ, downWallMat); wE.position.set(hx+B_HOLE_W/2, -holeDepth/2, hz);
            scene.add(wN, wS, wW, wE); pitMeshes.push(wN, wS, wW, wE);
        }
    }
    pitVoid = new THREE.Mesh(new THREE.PlaneGeometry(PIT_TOTAL, PIT_TOTAL), voidMat);
    pitVoid.rotation.x = -Math.PI/2;
    pitVoid.position.set(pitCX, -holeDepth + 0.1, pitCZ);
    scene.add(pitVoid);
}

function spawnDoors(){
    doors.forEach(d => scene.remove(d.group)); doors = [];
    trueDoorIdx = Math.random() > 0.5 ? 0 : 1; 

    function createDoorObj(r, c, isTrue, label) {
        let group = new THREE.Group();
        let wx = (c - COLS/2)*UNIT + UNIT/2;
        let wz = (r - ROWS/2)*UNIT + UNIT/2;
        group.position.set(wx, 0, wz + UNIT/2 - 0.2);
        group.rotation.y = 0; 
        
        const fMat2 = new THREE.MeshStandardMaterial({color:0x221100, roughness:0.9});
        const tp = new THREE.Mesh(new THREE.BoxGeometry(3.0, 0.2, 0.3), fMat2); tp.position.set(0, 4.0, 0);
        group.add(tp);

        let pivot = new THREE.Group();
        pivot.position.set(1.4, 2.0, 0);
        const dp = new THREE.Mesh(new THREE.BoxGeometry(2.8, 3.8, 0.15), new THREE.MeshStandardMaterial({color:0x442211, roughness:0.8})); 
        dp.position.set(-1.4, 0, 0); pivot.add(dp);
        const kn = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshStandardMaterial({color:0x999999, metalness:0.8})); 
        kn.position.set(-2.4, 0, 0.12); dp.add(kn);
        
        group.add(pivot);
        scene.add(group); group.updateMatrixWorld(true);
        const sOff = new THREE.Vector3(0, 1.5, 2.0); sOff.applyQuaternion(group.quaternion); 
        let sensor = new THREE.Vector3().copy(group.position).add(sOff);
        doors.push({ group: group, pivot: pivot, sensor: sensor, isTrue: isTrue, opened: false });
    }

    createDoorObj(bingoDoorL.r, bingoDoorL.c, trueDoorIdx === 0, "LEFT");
    createDoorObj(bingoDoorR.r, bingoDoorR.c, trueDoorIdx === 1, "RIGHT");
}

function buildUnderground(){
    ugObjs.forEach(o=>scene.remove(o)); ugObjs=[];
    if(ugWalls){scene.remove(ugWalls); ugWalls=null;} if(ugFloor){scene.remove(ugFloor); ugFloor=null;} if(ugCeil){scene.remove(ugCeil); ugCeil=null;}
    if(ladderItem){scene.remove(ladderItem); ladderItem=null;} if(ladderMesh){scene.remove(ladderMesh); ladderMesh=null;} if(holeGroup){scene.remove(holeGroup); holeGroup=null;}
    ladderPlaced = false; climbing = false; climbT = 0;

    ugMap = Array(UG_R).fill().map(()=>Array(UG_C).fill(1));
    const vis = Array(UG_R).fill().map(()=>Array(UG_C).fill(false));
    function carve(r,c){
        vis[r][c] = true; ugMap[r][c] = 0;
        const dirs = [[-2,0], [2,0], [0,-2], [0,2]].sort(()=>Math.random()-.5);
        for(const[dr,dc] of dirs){ const nr = r+dr, nc = c+dc;
        if(nr>0 && nr<UG_R-1 && nc>0 && nc<UG_C-1 && !vis[nr][nc]){ ugMap[r+dr/2][c+dc/2] = 0; carve(nr,nc); } }
    }
    carve(1,1);
    
    ugOX = pitCX; ugOZ = pitCZ;
    function ugW(r,c){ return {x: ugOX + (c-UG_C/2)*UG_U + UG_U/2, z: ugOZ + (r-UG_R/2)*UG_U + UG_U/2}; }

    let wc = 0; for(let r=0; r<UG_R; r++) for(let c=0; c<UG_C; c++) if(ugMap[r][c]===1) wc++;
    const ugWGeo = new THREE.BoxGeometry(UG_U, UG_WH, UG_U); const ugWMat = new THREE.MeshStandardMaterial({color:0x111, roughness:0.9});
    ugWalls = new THREE.InstancedMesh(ugWGeo, ugWMat, wc);
    const dum2 = new THREE.Object3D(); let ui = 0;
    for(let r=0; r<UG_R; r++){ for(let c=0; c<UG_C; c++){ if(ugMap[r][c]===1){ const p=ugW(r,c);
    dum2.position.set(p.x, UG_Y+UG_WH/2, p.z); dum2.updateMatrix(); ugWalls.setMatrixAt(ui++, dum2.matrix); } } }
    ugWalls.instanceMatrix.needsUpdate = true; scene.add(ugWalls); ugObjs.push(ugWalls);
    const ugMW = UG_C*UG_U, ugMH = UG_R*UG_U;
    ugFloor = new THREE.Mesh(new THREE.PlaneGeometry(ugMW, ugMH), new THREE.MeshStandardMaterial({color:0x222, roughness:1.0})); ugFloor.rotation.x = -Math.PI/2;
    ugFloor.position.set(ugOX, UG_Y, ugOZ); scene.add(ugFloor); ugObjs.push(ugFloor);
    ugCeil = new THREE.Mesh(new THREE.PlaneGeometry(ugMW, ugMH), new THREE.MeshStandardMaterial({color:0x000})); ugCeil.rotation.x = Math.PI/2; ugCeil.position.set(ugOX, UG_Y+UG_WH, ugOZ); scene.add(ugCeil);
    ugObjs.push(ugCeil);

function gridCollide(ox, oz, nx, nz, rad) {
    if(isFlying) return {x: nx, z: nz};
    if(isNaN(nx) || isNaN(nz)) return { x: ox, z: oz };
    if(player.position.y < -.05) return { x: nx, z: nz };
    let resultX = nx, resultZ = nz;
    const checkAxisCollision = (targetX, targetZ) => {
        const pc = Math.floor((ox - UNIT/2 + (COLS*UNIT)/2) / UNIT);
        const pr = Math.floor((oz - UNIT/2 + (ROWS*UNIT)/2) / UNIT);
        for(let r = pr-1; r <= pr+1; r++) {
            for(let c = pc-1; c <= pc+1; c++) {
                if(r<0 || r>=ROWS || c<0 || c>=COLS) continue;
                if(mapData[r][c] === 1) { 
                    const wx = (c - COLS/2)*UNIT + UNIT/2, wz = (r - ROWS/2)*UNIT + UNIT/2;
                    const half = UNIT/2 + rad;
                    if(targetX > wx - half && targetX < wx + half && targetZ > wz - half && targetZ < wz + half) return true;
                }
            }
        }
        return false;
    };
    if (checkAxisCollision(nx, oz)) resultX = ox; 
    if (checkAxisCollision(resultX, nz)) resultZ = oz;
    let finalPc = Math.floor((resultX - UNIT/2 + (COLS*UNIT)/2) / UNIT);
    let finalPr = Math.floor((resultZ - UNIT/2 + (ROWS*UNIT)/2) / UNIT);
    if(finalPr>=0 && finalPr<ROWS && finalPc>=0 && finalPc<COLS && mapData[finalPr][finalPc] === 2) {
        return { x: ox, z: oz };
    }
    return { x: resultX, z: resultZ };
}

function ugCollide(oldX, oldZ, newX, newZ, rad) {
    if(isFlying) return {x: newX, z: newZ};
    if(isNaN(newX) || isNaN(newZ)) return { x: oldX, z: oldZ };
    let resultX = newX, resultZ = newZ;
    const checkUgCollision = (tx, tz) => {
        const pc = Math.floor((oldX - ugOX + (UG_C*UG_U)/2) / UG_U);
        const pr = Math.floor((oldZ - ugOZ + (UG_R*UG_U)/2) / UG_U);
        for(let r = Math.max(0, pr-1); r <= Math.min(UG_R-1, pr+1); r++) {
            for(let c = Math.max(0, pc-1); c <= Math.min(UG_C-1, pc+1); c++) {
                if(ugMap[r][c] !== 1) continue;
                const wx = ugOX + (c - UG_C/2)*UG_U + UG_U/2, wz = ugOZ + (r - UG_R/2)*UG_U + UG_U/2;
                const half = UG_U/2 + rad;
                if(tx > wx - half && tx < wx + half && tz > wz - half && tz < wz + half) return true;
            }
        }
        return false;
    };
    if (checkUgCollision(newX, oldZ)) resultX = oldX; if (checkUgCollision(resultX, newZ)) resultZ = oldZ; return { x: resultX, z: resultZ };
}

let entities = [];
function mkEntity(){
    const e = new THREE.Group();
    const c = document.createElement('canvas');
    c.width = 128; c.height = 128;
    const ctx = c.getContext('2d');
    
    ctx.fillStyle = '#0a0a0a';
    ctx.beginPath(); ctx.arc(64, 64, 60, 0, Math.PI*2); ctx.fill();
    
    ctx.fillStyle = '#fff'; 
    ctx.beginPath();
    ctx.arc(40, 50, 15, 0, Math.PI*2); ctx.arc(88, 50, 15, 0, Math.PI*2); ctx.fill();
    
    ctx.fillStyle = '#f00';
    ctx.beginPath(); ctx.arc(40, 50, 5, 0, Math.PI*2); ctx.arc(88, 50, 5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#fff'; 
    ctx.lineWidth = 4; 
    ctx.beginPath(); ctx.moveTo(35, 90);
    ctx.bezierCurveTo(64, 110, 64, 110, 93, 90); ctx.stroke();

    const tex = new THREE.CanvasTexture(c);
    const mat = new THREE.SpriteMaterial({ map: tex, color: 0xffffff }); 
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(5, 5, 1);
    sprite.position.y = 2.5; e.add(sprite); scene.add(e); 
    
    return {mesh: e, sprite: sprite, state: 'patrol', patrolTarget: null, baseSpeed: 0.12, speed: 0.12, stuckT: 0, lastPos: new THREE.Vector3()};
}

function entityAI(e, pp){
    const ep = e.mesh.position; const dist = Math.sqrt((ep.x-pp.x)**2 + (ep.z-pp.z)**2); e.stuckT++;
    if(e.stuckT > 60){
        const sd = Math.sqrt((ep.x-e.lastPos.x)**2 + (ep.z-e.lastPos.z)**2);
        if(sd < .2) e.patrolTarget = safeSpawn(pp, 0);
        e.lastPos.copy(ep); e.stuckT = 0;
    }
    
    if (gameState === 'MENU' || isFlying) { 
        e.state = 'patrol';
    } else {
        if(dist < 50 && gameState === 'PLAYING' && player.position.y >= -0.2){ 
            e.state = 'chase';
        } else if(e.state === 'chase' && (dist > 55 || player.position.y < -.2)){ 
            e.state = 'patrol';
            e.patrolTarget = safeSpawn(pp, 0);
        }
    }

    const dest = e.state === 'chase' ? pp : e.patrolTarget;
    if(e.state === 'patrol' && (!dest || (Math.abs(ep.x-dest.x)<2.0 && Math.abs(ep.z-dest.z)<2.0))) {
        e.patrolTarget = safeSpawn(pp, 0);
    }
    
    if(dest) {
        const dx = dest.x-ep.x, dz = dest.z-ep.z, len = Math.sqrt(dx*dx+dz*dz);
        if(len > .1){
            const sp = e.state === 'chase' ? e.speed*1.5 : e.speed; const te = {x: ep.x+dx/len*sp, z: ep.z+dz/len*sp}; 
            const se = gridCollide(ep.x, ep.z, te.x, te.z, .6);
            ep.x = se.x; ep.z = se.z;
        }
    }
}

            if (selectedTargetSpawn) {
                // 유저가 설정창에서 원하는 시간을 선택하거나 H 스폰을 누른 경우 -> 그 자리로 정확히 이동
                player.position.set(selectedTargetSpawn.x, selectedTargetSpawn.y, selectedTargetSpawn.z);
                selectedTargetSpawn = null; // 1회용으로 쓰고 초기화
            } else {
                // 그냥 평범하게 게임을 시작한 경우 -> 나갔던 곳이 아니라 무조건 '새로운' 무작위 위치
                // (네 맵 크기에 맞게 100 이라는 숫자를 조절해 줘)
                const randomX = (Math.random() - 0.5) * 100;
                const randomZ = (Math.random() - 0.5) * 100;
                player.position.set(randomX, 1.5, randomZ); // y축(높이)은 1.5 등 기존 셋팅 유지
            }
        }
</script>
</body>
</html>
